<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Paso 4</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f4f2f8;color:#1a1a1a;padding-bottom:40px}
.hdr{background:#1a1080;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px}
.hlogo{width:36px;height:36px;background:#fff;border-radius:7px;overflow:hidden;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700}
.hdr p{font-size:11px;opacity:0.85}
.bar{display:flex;gap:3px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0ddf0}
.sd{flex:1;height:4px;border-radius:2px;background:#e0d8f0}
.sd.done{background:#6666cc}.sd.active{background:#1a1080}
.card{background:#fff;border:1px solid #e0ddf0;border-radius:12px;padding:13px;margin:12px 16px 0}
.card h2{font-size:11px;font-weight:600;color:#1a1080;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #eeeeff;padding-bottom:6px;margin-bottom:9px}
.fg{margin-bottom:8px}
.fg label{font-size:11px;color:#555;display:block;margin-bottom:2px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.fg textarea{resize:vertical;min-height:60px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px}
.r4 .fg label{font-size:9px}.r4 .fg input{padding:5px 3px;font-size:11px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mr{display:flex;align-items:center;gap:4px}
.mr label{flex:1;font-size:11px;color:#555;line-height:1.3}
.mr input{width:46px;border:1px solid #ddd;border-radius:7px;padding:4px;font-size:12px;text-align:center}
.mr span{font-size:10px;color:#999;width:22px}
.nav{display:flex;gap:8px;padding:12px 16px 0}
.nav a{flex:1;display:flex;align-items:center;justify-content:center;padding:13px;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none}
.bm{background:#1a1080;color:#fff}.bo{background:#fff;color:#333;border:1px solid #ddd}.bg{background:#1a7340;color:#fff}
.cr{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.ci{display:flex;align-items:center;gap:4px;font-size:13px}
.ci input{width:15px;height:15px;accent-color:#1a1080}
input[type=file]{display:none}
.plist{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.pitem{display:flex;align-items:center;gap:10px;background:#f0f0ff;border:1px solid #d0d0ee;border-radius:10px;padding:8px 10px}
.pi{font-size:20px}.pn{flex:1}
.pn b{font-size:12px;color:#333;display:block}
.pn small{font-size:10px;color:#999}
.pd{background:#fee;color:#c00;border:none;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer}
.apb{background:#eeeeff;color:#1a1080;border:2px dashed #9999dd;border-radius:10px;padding:14px;text-align:center;font-size:14px;font-weight:600;margin-top:8px;display:block;text-decoration:none;cursor:pointer}
.pcb{display:none;background:#1a1080;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}
.stars{display:flex;gap:10px;justify-content:center;font-size:32px;margin:8px 0}
.star{cursor:pointer;color:#ddd}.star.on{color:#f0a500}
.sc{border:1.5px dashed #9999cc;border-radius:10px;width:100%;height:110px;background:#fafaff;touch-action:none;cursor:crosshair;margin-top:8px;display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a7340;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;display:none;white-space:nowrap}
.toast.err{background:#a32d2d}.toast.show{display:block}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:none;margin:8px 16px 0;width:calc(100% - 32px);text-decoration:none}
</style></head><body>
